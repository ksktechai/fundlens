services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fundlens-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: fundlens
      POSTGRES_USER: fundlens
      POSTGRES_PASSWORD: fundlens
    volumes:
      - fundlens-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundlens -d fundlens"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fundlens-pgdata:
