# ---------------------------------------------------------------------------
# Datasource (PostgreSQL + pgvector)
# ---------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
# dev expects the docker-compose postgres (make up) on localhost:5433
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/fundlens
%dev.quarkus.datasource.username=fundlens
%dev.quarkus.datasource.password=fundlens
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/fundlens}
%prod.quarkus.datasource.username=${DB_USER:fundlens}
%prod.quarkus.datasource.password=${DB_PASSWORD:fundlens}
# %test uses Quarkus Dev Services (Testcontainers) with the pgvector image
quarkus.datasource.devservices.image-name=pgvector/pgvector:pg16

quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=none

# ---------------------------------------------------------------------------
# LangChain4j / Ollama (LLM host runs on the LAN, not in a container)
# ---------------------------------------------------------------------------
quarkus.langchain4j.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.chat-model.model-name=${OLLAMA_CHAT_MODEL:qwen3:30b}
quarkus.langchain4j.ollama.embedding-model.model-name=${OLLAMA_EMBED_MODEL:nomic-embed-text}
quarkus.langchain4j.ollama.timeout=120s

# Named models: one per agent so compliance can later run a different model
quarkus.langchain4j.ollama.research.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.research.chat-model.model-name=${OLLAMA_RESEARCH_MODEL:qwen3:30b}
quarkus.langchain4j.ollama.research.timeout=120s
quarkus.langchain4j.ollama.writer.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.writer.chat-model.model-name=${OLLAMA_WRITER_MODEL:qwen3:30b}
quarkus.langchain4j.ollama.writer.timeout=120s
quarkus.langchain4j.ollama.compliance.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
quarkus.langchain4j.ollama.compliance.chat-model.model-name=${OLLAMA_COMPLIANCE_MODEL:qwen3:8b}
quarkus.langchain4j.ollama.compliance.timeout=120s

# pgvector embedding store; the extension creates the `embeddings` table itself
# (see README) — Flyway only installs the `vector` extension (V2).
quarkus.langchain4j.pgvector.dimension=768

# ---------------------------------------------------------------------------
# Disclose Register (api.business.govt.nz)
# ---------------------------------------------------------------------------
disclose.api.subscription-key=${DISCLOSE_SUBSCRIPTION_KEY:changeme}
disclose.api.organisation-id=${DISCLOSE_ORGANISATION_ID:changeme}
quarkus.rest-client.disclose-register.url=${DISCLOSE_BASE_URL:https://api.business.govt.nz/gateway/companies-office/disclose-register/v1}
# CRITICAL: document downloads are 302 redirects whose Location must be fetched
# WITHOUT the subscription key — never auto-follow.
quarkus.rest-client.disclose-register.follow-redirects=false
disclose.sync.fund-numbers=${DISCLOSE_FUND_NUMBERS:}

# ---------------------------------------------------------------------------
# Test profile: WireMock provides Ollama + Disclose endpoints (see
# WireMockTestResource), Dev Services provides pgvector Postgres.
# ---------------------------------------------------------------------------
%test.quarkus.langchain4j.ollama.timeout=3s
%test.quarkus.langchain4j.ollama.research.timeout=3s
%test.quarkus.langchain4j.ollama.writer.timeout=3s
%test.quarkus.langchain4j.ollama.compliance.timeout=3s
%test.quarkus.scheduler.enabled=false
%test.disclose.api.subscription-key=test-key
%test.disclose.api.organisation-id=test-org
%test.disclose.sync.fund-numbers=FND10001

# ---------------------------------------------------------------------------
# Logging — API, downstream clients, DB (each layer toggles via env var)
# ---------------------------------------------------------------------------
# one-line access log per API request (%D needs record-request-start-time)
quarkus.http.access-log.enabled=${LOG_ACCESS:true}
quarkus.http.access-log.pattern=%h "%r" %s %b bytes %D ms
quarkus.http.record-request-start-time=true

# API request/response bodies (HttpLoggingFilter; JSON/text only, truncated)
fundlens.log.http-bodies=${LOG_HTTP_BODIES:true}

# Disclose Register REST client — request/response incl. bodies.
# WARNING: request-response scope logs headers incl. Ocp-Apim-Subscription-Key;
# set LOG_REST_CLIENT_SCOPE=none in production.
quarkus.rest-client.logging.scope=${LOG_REST_CLIENT_SCOPE:request-response}
quarkus.rest-client.logging.body-limit=2000
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=DEBUG

# LLM traffic (chat + embeddings, full prompts/answers) per named model
quarkus.langchain4j.ollama.log-requests=${LOG_LLM:true}
quarkus.langchain4j.ollama.log-responses=${LOG_LLM:true}
quarkus.langchain4j.ollama.research.log-requests=${LOG_LLM:true}
quarkus.langchain4j.ollama.research.log-responses=${LOG_LLM:true}
quarkus.langchain4j.ollama.writer.log-requests=${LOG_LLM:true}
quarkus.langchain4j.ollama.writer.log-responses=${LOG_LLM:true}
quarkus.langchain4j.ollama.compliance.log-requests=${LOG_LLM:true}
quarkus.langchain4j.ollama.compliance.log-responses=${LOG_LLM:true}

# SQL statements with bind parameters
quarkus.hibernate-orm.log.sql=${LOG_SQL:true}
quarkus.hibernate-orm.log.bind-parameters=${LOG_SQL:true}

# keep the offline test suite / CI output quiet
%test.quarkus.http.access-log.enabled=false
%test.fundlens.log.http-bodies=false
%test.quarkus.rest-client.logging.scope=none
%test.quarkus.langchain4j.ollama.log-requests=false
%test.quarkus.langchain4j.ollama.log-responses=false
%test.quarkus.langchain4j.ollama.research.log-requests=false
%test.quarkus.langchain4j.ollama.research.log-responses=false
%test.quarkus.langchain4j.ollama.writer.log-requests=false
%test.quarkus.langchain4j.ollama.writer.log-responses=false
%test.quarkus.langchain4j.ollama.compliance.log-requests=false
%test.quarkus.langchain4j.ollama.compliance.log-responses=false
%test.quarkus.hibernate-orm.log.sql=false
%test.quarkus.hibernate-orm.log.bind-parameters=false

# ---------------------------------------------------------------------------
# Misc
# ---------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=FundLens API
quarkus.smallrye-openapi.info-description=KiwiSaver fund explainer with a compliance-gated multi-agent LLM pipeline
quarkus.http.limits.max-body-size=20M
